<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">
        
        <h1 class="text-3xl font-extrabold text-gray-900 mb-8 text-center">
            Günlük Görevler
        </h1>

        <div class="flex gap-2 mb-6">
            <input type="text" 
                   id="todo-input"
                   placeholder="Yeni bir görev yaz..." 
                   class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <button id="add-btn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition shadow-md">
                Ekle
            </button>
        </div>

        <ul id="todo-list" class="space-y-3">
            <li class="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-100 opacity-100">
                
                <div class="flex items-center gap-3">
                    <input type="checkbox" checked class="w-5 h-5 cursor-pointer">
                    
                    <span class="line-through text-gray-400 font-medium">
                        sınava çalışılacak.
                    </span>
                </div>

                <button class="text-red-500 hover:text-red-600 transition">
                    Sil
                </button>
            </li>
        </ul>      
    </div>
    
    <script src="script.js"></script>
</body>
</html>
